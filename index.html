<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>口袋保险箱</title>
  <meta name="theme-color" content="#eef4fa" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="口袋保险箱" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="vault-icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="vault-icon.svg" />
  <style>
    :root {
      color-scheme: light;
      --bg: #eef4fa;
      --ink: #14202b;
      --muted: rgba(20, 32, 43, .56);
      --soft: rgba(20, 32, 43, .76);
      --line: rgba(48, 72, 98, .13);
      --line-strong: rgba(48, 72, 98, .22);
      --glass: rgba(255, 255, 255, .58);
      --glass-strong: rgba(255, 255, 255, .72);
      --field: rgba(255, 255, 255, .54);
      --gold: #6877f4;
      --gold-deep: #56c7bc;
      --danger: #e35d6a;
      --shadow: 0 24px 80px rgba(64, 91, 128, .20);
      --radius-xl: 34px;
      --radius: 24px;
      --radius-sm: 16px;
      font-family: "SF Pro Display", "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      overflow-x: hidden;
      color: var(--ink);
      background:
        radial-gradient(circle at 12% 4%, rgba(136, 151, 255, .32), transparent 23rem),
        radial-gradient(circle at 86% 16%, rgba(108, 219, 207, .22), transparent 22rem),
        radial-gradient(circle at 42% 86%, rgba(221, 175, 255, .20), transparent 22rem),
        linear-gradient(145deg, #f7fbff 0%, #edf4fb 45%, #eaf0f8 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: -30%;
      z-index: -2;
      background:
        conic-gradient(from 90deg at 32% 34%, rgba(105,119,244,.18), transparent 18%, rgba(86,199,188,.16), transparent 54%, rgba(207,160,255,.14), transparent 78%),
        radial-gradient(circle at 50% 50%, rgba(255,255,255,.72), transparent 18rem);
      filter: blur(28px) saturate(1.25);
      animation: ambience 18s ease-in-out infinite alternate;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: -1;
      opacity: .18;
      background-image:
        linear-gradient(rgba(45,70,100,.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(45,70,100,.06) 1px, transparent 1px);
      background-size: 34px 34px;
      mask-image: linear-gradient(to bottom, black, transparent 72%);
    }

    @keyframes ambience {
      from { transform: translate3d(-2%, -1%, 0) rotate(-4deg) scale(1); }
      to { transform: translate3d(3%, 2%, 0) rotate(5deg) scale(1.08); }
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(16px) scale(.985); filter: blur(5px); }
      to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
    }

    @keyframes sheetIn {
      from { opacity: 0; transform: translateY(20px) scale(.965); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    button, input, textarea { font: inherit; }
    button {
      border: 0;
      cursor: pointer;
      color: inherit;
    }

    .app {
      width: min(100%, 720px);
      margin: 0 auto;
      padding: calc(22px + env(safe-area-inset-top)) 16px calc(30px + env(safe-area-inset-bottom));
    }

    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 6px 2px 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 13px;
    }

    .mark {
      width: 54px;
      height: 54px;
      border-radius: 20px;
      display: grid;
      place-items: center;
      color: #ffffff;
      background:
        radial-gradient(circle at 26% 20%, rgba(255,255,255,.86), transparent 22%),
        linear-gradient(145deg, #8d9bff, #5ad1c6 58%, #d7b8ff);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.55), 0 18px 42px rgba(105, 119, 244, .20);
      font-size: 24px;
      font-weight: 900;
    }

    .eyebrow {
      margin: 0 0 4px;
      color: var(--gold);
      font-size: 11px;
      letter-spacing: .24em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: 27px;
      line-height: 1;
      letter-spacing: -.055em;
    }

    .count {
      flex: none;
      color: var(--muted);
      font-size: 14px;
      letter-spacing: -.02em;
    }

    .hero {
      position: relative;
      isolation: isolate;
      overflow: hidden;
      min-height: 126px;
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      padding: 24px 22px;
      background:
        linear-gradient(135deg, rgba(255,255,255,.84), rgba(255,255,255,.46)),
        rgba(255,255,255,.58);
      backdrop-filter: blur(34px) saturate(1.45);
      -webkit-backdrop-filter: blur(34px) saturate(1.45);
      box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,.72);
      animation: rise .54s cubic-bezier(.2,.8,.2,1) both;
    }

    .hero::before {
      content: "";
      position: absolute;
      right: -36px;
      top: -42px;
      width: 230px;
      height: 190px;
      z-index: 0;
      border-radius: 48px;
      background:
        radial-gradient(circle at 28% 32%, rgba(255,255,255,.92), transparent 25%),
        radial-gradient(circle at 66% 44%, rgba(104,119,244,.34), transparent 34%),
        radial-gradient(circle at 48% 78%, rgba(86,199,188,.30), transparent 34%);
      filter: blur(18px) saturate(1.18);
      opacity: .72;
      transform: rotate(-10deg);
    }

    .hero::after {
      content: "";
      position: absolute;
      right: 22px;
      top: 24px;
      width: 156px;
      height: 96px;
      z-index: 0;
      border: 1px solid rgba(255,255,255,.56);
      border-radius: 32px;
      background:
        linear-gradient(135deg, rgba(255,255,255,.72), rgba(255,255,255,.22)),
        linear-gradient(135deg, rgba(104,119,244,.20), rgba(86,199,188,.18));
      backdrop-filter: blur(22px) saturate(1.4);
      -webkit-backdrop-filter: blur(22px) saturate(1.4);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.78),
        0 18px 42px rgba(92,119,158,.14),
        -54px 48px 0 -26px rgba(255,255,255,.52),
        -86px 14px 0 -34px rgba(104,119,244,.18),
        38px 70px 0 -38px rgba(86,199,188,.20);
      transform: rotate(-8deg);
    }

    .hero h2 {
      position: relative;
      z-index: 1;
      margin: 0 0 10px;
      max-width: 330px;
      font-size: clamp(28px, 7vw, 40px);
      line-height: 1.04;
      letter-spacing: -.065em;
    }

    .hero p {
      position: relative;
      z-index: 1;
      margin: 0;
      max-width: 390px;
      color: var(--muted);
      line-height: 1.62;
      font-size: 15px;
    }

    .toolbar {
      position: sticky;
      top: env(safe-area-inset-top);
      z-index: 4;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      padding: 14px 0;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
    }

    .search, .input, .textarea {
      width: 100%;
      min-height: 50px;
      border: 1px solid var(--line);
      border-radius: 19px;
      outline: none;
      color: var(--ink);
      background:
        linear-gradient(180deg, rgba(255,255,255,.90), rgba(255,255,255,.56)),
        rgba(255,255,255,.58);
      backdrop-filter: blur(22px) saturate(1.5);
      -webkit-backdrop-filter: blur(22px) saturate(1.5);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.82), 0 14px 40px rgba(64,91,128,.10);
      padding: 12px 15px;
      font-size: 16px;
    }

    .search::placeholder,
    .input::placeholder,
    .textarea::placeholder { color: rgba(20, 32, 43, .38); }

    .search:focus,
    .input:focus,
    .textarea:focus {
      border-color: rgba(104,119,244,.44);
      box-shadow: 0 0 0 4px rgba(104,119,244,.12), inset 0 1px 0 rgba(255,255,255,.85);
    }

    .btn {
      min-height: 50px;
      padding: 0 18px;
      border-radius: 19px;
      color: #ffffff;
      background: linear-gradient(145deg, #7d8cff, #55cfc4);
      font-weight: 850;
      box-shadow: 0 18px 38px rgba(104,119,244,.20), inset 0 1px 0 rgba(255,255,255,.38);
      transition: transform .16s ease, filter .16s ease;
    }

    .btn.ghost {
      color: var(--soft);
      background: rgba(255,255,255,.58);
      border: 1px solid var(--line);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.72);
    }

    .btn.danger {
      color: #c23d4b;
      background: rgba(255,123,123,.12);
      border: 1px solid rgba(227,93,106,.24);
      box-shadow: none;
    }

    .btn:active, .card:active, .chip:active { transform: scale(.985); }

    .cards {
      display: grid;
      gap: 12px;
    }

    .card {
      position: relative;
      overflow: hidden;
      display: grid;
      gap: 13px;
      min-height: 132px;
      width: 100%;
      text-align: left;
      border: 1px solid var(--line);
      border-radius: 28px;
      padding: 18px;
      background:
        linear-gradient(145deg, rgba(255,255,255,.92), rgba(255,255,255,.52)),
        rgba(255,255,255,.58);
      backdrop-filter: blur(28px) saturate(1.35);
      -webkit-backdrop-filter: blur(28px) saturate(1.35);
      box-shadow: 0 18px 54px rgba(64,91,128,.14), inset 0 1px 0 rgba(255,255,255,.80);
      animation: rise .45s cubic-bezier(.2,.8,.2,1) both;
      transition: transform .18s ease, border-color .18s ease, background .18s ease;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: .75;
      background:
        radial-gradient(circle at 18% 0%, rgba(255,255,255,.78), transparent 12rem),
        linear-gradient(90deg, rgba(104,119,244,.10), transparent 42%);
      mix-blend-mode: screen;
    }

    .card > * { position: relative; z-index: 1; }

    .card-main {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
    }

    .title {
      margin: 0;
      color: var(--ink);
      font-size: 20px;
      line-height: 1.18;
      letter-spacing: -.045em;
      word-break: break-word;
    }

    .chevron {
      width: 31px;
      height: 31px;
      flex: none;
      border-radius: 999px;
      display: grid;
      place-items: center;
      color: rgba(20,32,43,.52);
      background: rgba(255,255,255,.62);
      border: 1px solid rgba(48,72,98,.10);
    }

    .summary {
      display: grid;
      gap: 7px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
    }

    .summary-row {
      display: flex;
      gap: 9px;
      min-width: 0;
    }

    .summary-label {
      flex: none;
      color: rgba(104,119,244,.76);
      font-size: 12px;
      letter-spacing: .12em;
      text-transform: uppercase;
    }

    .summary-text {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .empty {
      border: 1px dashed rgba(48,72,98,.16);
      border-radius: 28px;
      padding: 40px 20px;
      text-align: center;
      color: var(--muted);
      background: rgba(255,255,255,.50);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      line-height: 1.75;
    }

    .utility {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }

    dialog {
      width: min(94vw, 560px);
      max-height: min(88vh, 760px);
      overflow: auto;
      border: 1px solid rgba(48,72,98,.16);
      border-radius: 32px;
      padding: 0;
      color: var(--ink);
      background:
        linear-gradient(145deg, rgba(255,255,255,.96), rgba(255,255,255,.66)),
        rgba(238,244,250,.78);
      backdrop-filter: blur(38px) saturate(1.72);
      -webkit-backdrop-filter: blur(38px) saturate(1.72);
      box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,.86);
      animation: sheetIn .24s cubic-bezier(.2,.8,.2,1) both;
    }

    dialog::backdrop {
      background: rgba(31,48,66,.34);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .sheet {
      display: grid;
      gap: 15px;
      padding: 20px;
    }

    .sheet-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
    }

    .sheet-title {
      margin: 0;
      font-size: 28px;
      line-height: 1.08;
      letter-spacing: -.06em;
      word-break: break-word;
    }

    .close {
      width: 36px;
      height: 36px;
      flex: none;
      border-radius: 999px;
      color: var(--ink);
      background: rgba(255,255,255,.70);
      border: 1px solid rgba(48,72,98,.10);
    }

    .detail-grid {
      display: grid;
      gap: 10px;
    }

    .detail {
      display: grid;
      gap: 7px;
    }

    .label {
      color: var(--muted);
      font-size: 12px;
      letter-spacing: .12em;
      text-transform: uppercase;
    }

    .value {
      min-height: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 12px 14px;
      color: var(--soft);
      background: rgba(255,255,255,.58);
      word-break: break-all;
    }

    .value code {
      color: var(--gold);
      font-family: "SF Mono", ui-monospace, Menlo, Consolas, monospace;
      font-size: 14px;
    }

    .note {
      white-space: pre-wrap;
      line-height: 1.55;
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-top: 3px;
    }

    .chip {
      min-height: 46px;
      border-radius: 17px;
      color: var(--ink);
      background: rgba(255,255,255,.58);
      border: 1px solid var(--line);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      font-weight: 650;
    }

    .chip.gold {
      color: #ffffff;
      background: linear-gradient(145deg, #7d8cff, #55cfc4);
      border: 0;
    }

    .chip.warn {
      color: #c23d4b;
      border-color: rgba(227,93,106,.26);
      background: rgba(255,123,123,.12);
    }

    .form {
      display: grid;
      gap: 12px;
      padding: 20px;
    }

    .form h2 {
      margin: 0 0 2px;
      font-size: 28px;
      letter-spacing: -.06em;
    }

    label {
      display: grid;
      gap: 7px;
      color: var(--muted);
      font-size: 13px;
    }

    .textarea {
      min-height: 96px;
      resize: vertical;
    }

    .form-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 4px;
    }

    .toast {
      position: fixed;
      left: 16px;
      right: 16px;
      bottom: calc(18px + env(safe-area-inset-bottom));
      z-index: 20;
      width: min(520px, calc(100% - 32px));
      margin: 0 auto;
      padding: 13px 15px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255,255,255,.82);
      color: var(--ink);
      box-shadow: var(--shadow);
      text-align: center;
      opacity: 0;
      transform: translateY(12px);
      transition: .22s;
      pointer-events: none;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .hidden { display: none !important; }

    @media (min-width: 700px) {
      .cards { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .card { min-height: 146px; }
    }

    @media (max-width: 420px) {
      .hero { min-height: 118px; border-radius: 30px; }
      .hero h2 { font-size: 32px; }
      .actions { grid-template-columns: 1fr 1fr; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: .001ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: .001ms !important;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="top">
      <div class="brand">
        <div class="mark" aria-hidden="true">✦</div>
        <div>
          <p class="eyebrow">Vault</p>
          <h1>口袋保险箱</h1>
        </div>
      </div>
      <div class="count" id="count">0 条</div>
    </header>

    <section class="hero">
      <h2>一处收好。</h2>
    </section>

    <section class="toolbar">
      <input id="search" class="search" autocomplete="off" placeholder="搜索标题、账号、备注…" />
      <button id="add" class="btn">新增</button>
    </section>

    <section id="cards" class="cards" aria-live="polite"></section>

    <section class="utility">
      <button id="export" class="btn ghost">导出</button>
      <button id="import" class="btn ghost">导入</button>
      <input id="file" class="hidden" type="file" accept="application/json,.json" />
    </section>
  </main>

  <dialog id="detailDialog">
    <section class="sheet" id="detailContent"></section>
  </dialog>

  <dialog id="editor">
    <form id="form" class="form">
      <h2 id="editorTitle">新增账号</h2>
      <input id="id" type="hidden" />
      <label>标题
        <input id="title" class="input" required placeholder="例如：微信 / Steam / 服务器" />
      </label>
      <label>账号
        <input id="username" class="input" placeholder="邮箱、手机号或用户名" />
      </label>
      <label>密码
        <input id="password" class="input" placeholder="密码" />
      </label>
      <label>网址
        <input id="website" class="input" placeholder="https://example.com" />
      </label>
      <label>备注
        <textarea id="note" class="textarea" placeholder="用途、到期时间、密保提示……"></textarea>
      </label>
      <div class="form-actions">
        <button type="button" id="cancel" class="btn ghost">取消</button>
        <button type="submit" class="btn">保存</button>
      </div>
    </form>
  </dialog>

  <div id="toast" class="toast"></div>

  <script>
    const STORAGE_KEY = 'pocket-vault-local-v1';
    const $ = (selector) => document.querySelector(selector);
    const els = {
      cards: $('#cards'),
      count: $('#count'),
      search: $('#search'),
      add: $('#add'),
      detailDialog: $('#detailDialog'),
      detailContent: $('#detailContent'),
      editor: $('#editor'),
      form: $('#form'),
      editorTitle: $('#editorTitle'),
      id: $('#id'),
      title: $('#title'),
      username: $('#username'),
      password: $('#password'),
      website: $('#website'),
      note: $('#note'),
      cancel: $('#cancel'),
      toast: $('#toast'),
      export: $('#export'),
      import: $('#import'),
      file: $('#file')
    };

    let accounts = loadAccounts();
    let selectedId = null;

    function uid() {
      return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
    }

    function nowText() {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    }

    function loadAccounts() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        const parsed = raw ? JSON.parse(raw) : [];
        return Array.isArray(parsed) ? parsed : [];
      } catch (_) {
        return [];
      }
    }

    function saveAccounts() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(accounts));
    }

    function toast(message) {
      els.toast.textContent = message;
      els.toast.classList.add('show');
      clearTimeout(toast.timer);
      toast.timer = setTimeout(() => els.toast.classList.remove('show'), 1800);
    }

    function escapeHtml(value) {
      const div = document.createElement('div');
      div.textContent = value == null ? '' : String(value);
      return div.innerHTML;
    }

    function mask(value) {
      const length = Math.max(8, Math.min(String(value || '').length, 18));
      return '•'.repeat(length);
    }

    function compact(value, fallback) {
      const text = String(value || '').trim();
      return text || fallback;
    }

    function filteredAccounts() {
      const q = els.search.value.trim().toLowerCase();
      const sorted = [...accounts].sort((a, b) => String(b.updatedAt || '').localeCompare(String(a.updatedAt || '')));
      if (!q) return sorted;
      return sorted.filter((a) => [a.title, a.username, a.note, a.website]
        .some((v) => String(v || '').toLowerCase().includes(q)));
    }

    function render() {
      const rows = filteredAccounts();
      els.count.textContent = `${accounts.length} 条`;
      els.cards.innerHTML = '';

      if (!rows.length) {
        els.cards.innerHTML = `<div class="empty">${accounts.length ? '没有搜到匹配内容。' : '还没有账号。点“新增”保存第一个账号。'}</div>`;
        return;
      }

      rows.forEach((account, index) => {
        const card = document.createElement('button');
        card.type = 'button';
        card.className = 'card';
        card.style.animationDelay = `${Math.min(index * 35, 180)}ms`;
        card.innerHTML = `
          <div class="card-main">
            <h3 class="title">${escapeHtml(compact(account.title, '未命名账号'))}</h3>
            <span class="chevron" aria-hidden="true">›</span>
          </div>
          <div class="summary">
            <div class="summary-row">
              <span class="summary-label">账号</span>
              <span class="summary-text">${escapeHtml(compact(account.username, '未填写'))}</span>
            </div>
            <div class="summary-row">
              <span class="summary-label">备注</span>
              <span class="summary-text">${escapeHtml(compact(account.note, '无备注'))}</span>
            </div>
          </div>
        `;
        card.addEventListener('click', () => openDetail(account.id));
        els.cards.appendChild(card);
      });
    }

    function openDetail(id) {
      const account = accounts.find((a) => a.id === id);
      if (!account) return;
      selectedId = id;
      let shown = false;
      els.detailContent.innerHTML = `
        <div class="sheet-head">
          <h2 class="sheet-title">${escapeHtml(compact(account.title, '未命名账号'))}</h2>
          <button class="close" type="button" aria-label="关闭">×</button>
        </div>
        <div class="detail-grid">
          <div class="detail">
            <div class="label">账号</div>
            <div class="value"><span>${escapeHtml(compact(account.username, '未填写'))}</span></div>
          </div>
          <div class="detail">
            <div class="label">密码</div>
            <div class="value"><code>${mask(account.password)}</code><button class="chip reveal" type="button">显示</button></div>
          </div>
          <div class="detail">
            <div class="label">网址</div>
            <div class="value"><span>${escapeHtml(compact(account.website, '未填写'))}</span></div>
          </div>
          <div class="detail">
            <div class="label">备注</div>
            <div class="value note">${escapeHtml(compact(account.note, '无备注'))}</div>
          </div>
        </div>
        <div class="actions">
          <button class="chip gold copy-user" type="button">复制账号</button>
          <button class="chip gold copy-pass" type="button">复制密码</button>
          <button class="chip edit" type="button">编辑</button>
          <button class="chip warn delete" type="button">删除</button>
        </div>
      `;

      els.detailContent.querySelector('.close').addEventListener('click', () => els.detailDialog.close());
      els.detailContent.querySelector('.reveal').addEventListener('click', () => {
        shown = !shown;
        els.detailContent.querySelector('code').textContent = shown ? (account.password || '') : mask(account.password);
        els.detailContent.querySelector('.reveal').textContent = shown ? '隐藏' : '显示';
      });
      els.detailContent.querySelector('.copy-user').addEventListener('click', () => copyText(account.username, '账号已复制'));
      els.detailContent.querySelector('.copy-pass').addEventListener('click', () => copyText(account.password, '密码已复制'));
      els.detailContent.querySelector('.edit').addEventListener('click', () => {
        els.detailDialog.close();
        openEditor(account);
      });
      els.detailContent.querySelector('.delete').addEventListener('click', () => deleteAccount(account.id));
      els.detailDialog.showModal();
    }

    async function copyText(value, message) {
      if (!value) return toast('没有可复制的内容');
      try {
        await navigator.clipboard.writeText(value);
        toast(message);
      } catch (_) {
        toast('复制失败，请长按手动复制');
      }
    }

    function openEditor(account) {
      els.editorTitle.textContent = account ? '编辑账号' : '新增账号';
      els.id.value = account?.id || '';
      els.title.value = account?.title || '';
      els.username.value = account?.username || '';
      els.password.value = account?.password || '';
      els.website.value = account?.website || '';
      els.note.value = account?.note || '';
      els.editor.showModal();
      setTimeout(() => els.title.focus(), 60);
    }

    function closeEditor() {
      els.editor.close();
      els.form.reset();
      els.id.value = '';
    }

    function deleteAccount(id) {
      const account = accounts.find((a) => a.id === id);
      if (!account) return;
      if (!confirm(`删除「${account.title || '未命名账号'}」？这个操作不能撤销。`)) return;
      accounts = accounts.filter((a) => a.id !== id);
      saveAccounts();
      els.detailDialog.close();
      render();
      toast('已删除');
    }

    els.form.addEventListener('submit', (event) => {
      event.preventDefault();
      const title = els.title.value.trim();
      if (!title) return toast('标题不能为空');

      const payload = {
        title,
        username: els.username.value.trim(),
        password: els.password.value,
        website: els.website.value.trim(),
        note: els.note.value.trim(),
        updatedAt: nowText()
      };

      if (els.id.value) {
        accounts = accounts.map((a) => a.id === els.id.value ? { ...a, ...payload } : a);
      } else {
        accounts.push({ id: uid(), createdAt: nowText(), ...payload });
      }

      saveAccounts();
      closeEditor();
      render();
      toast('已保存');
    });

    function exportBackup() {
      const blob = new Blob([JSON.stringify({ app: '口袋保险箱', version: 1, exportedAt: new Date().toISOString(), accounts }, null, 2)], {
        type: 'application/json'
      });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `口袋保险箱备份-${nowText()}.json`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
      toast('已导出');
    }

    function importBackup(file) {
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const parsed = JSON.parse(reader.result);
          const imported = Array.isArray(parsed) ? parsed : parsed.accounts;
          if (!Array.isArray(imported)) throw new Error('格式不对');
          if (!confirm(`导入 ${imported.length} 条数据？会覆盖当前 ${accounts.length} 条。`)) return;
          accounts = imported.map((a) => ({
            id: a.id || uid(),
            title: String(a.title || '未命名账号'),
            username: String(a.username || ''),
            password: String(a.password || ''),
            website: String(a.website || ''),
            note: String(a.note || a.remark || ''),
            createdAt: String(a.createdAt || nowText()),
            updatedAt: String(a.updatedAt || nowText())
          }));
          saveAccounts();
          render();
          toast('已导入');
        } catch (_) {
          toast('导入失败，文件格式不对');
        }
      };
      reader.readAsText(file);
    }

    els.add.addEventListener('click', () => openEditor(null));
    els.cancel.addEventListener('click', closeEditor);
    els.search.addEventListener('input', render);
    els.export.addEventListener('click', exportBackup);
    els.import.addEventListener('click', () => els.file.click());
    els.file.addEventListener('change', () => {
      if (els.file.files[0]) importBackup(els.file.files[0]);
      els.file.value = '';
    });
    els.editor.addEventListener('click', (event) => {
      if (event.target === els.editor) closeEditor();
    });
    els.detailDialog.addEventListener('click', (event) => {
      if (event.target === els.detailDialog) els.detailDialog.close();
    });

    render();

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
</body>
</html>
