<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>口袋保险箱</title>
  <meta name="theme-color" content="#101820" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="口袋保险箱" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="vault-icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="vault-icon.svg" />
  <style>
    :root {
      --ink: #101820;
      --ink-2: #162331;
      --card: rgba(26, 39, 53, .82);
      --card-strong: rgba(31, 47, 63, .96);
      --line: rgba(230, 207, 155, .18);
      --line-2: rgba(255, 255, 255, .10);
      --paper: #f8f0df;
      --muted: #a8b5c2;
      --gold: #d8b76f;
      --gold-2: #f3d994;
      --green: #65d6a6;
      --red: #ff7777;
      --shadow: 0 24px 80px rgba(0, 0, 0, .32);
      --radius: 24px;
      font-family: "PingFang SC", "SF Pro Display", "Microsoft YaHei", system-ui, sans-serif;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      color: var(--paper);
      background:
        radial-gradient(circle at 14% 8%, rgba(243, 217, 148, .24), transparent 18rem),
        radial-gradient(circle at 90% 0%, rgba(101, 214, 166, .12), transparent 16rem),
        linear-gradient(155deg, #080d12 0%, var(--ink) 48%, #0a1219 100%);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: .28;
      background-image:
        linear-gradient(rgba(255,255,255,.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.035) 1px, transparent 1px);
      background-size: 28px 28px;
      mask-image: linear-gradient(to bottom, black, transparent 70%);
    }

    body::after {
      content: "";
      position: fixed;
      inset: -25%;
      pointer-events: none;
      background:
        radial-gradient(circle at 22% 26%, rgba(243, 217, 148, .28), transparent 18rem),
        radial-gradient(circle at 78% 18%, rgba(98, 178, 255, .16), transparent 16rem),
        radial-gradient(circle at 55% 78%, rgba(101, 214, 166, .16), transparent 18rem);
      filter: blur(18px) saturate(1.25);
      animation: auroraDrift 16s ease-in-out infinite alternate;
      z-index: -1;
    }

    @keyframes auroraDrift {
      0% { transform: translate3d(-2%, -1%, 0) rotate(-3deg) scale(1); }
      100% { transform: translate3d(3%, 2%, 0) rotate(4deg) scale(1.06); }
    }

    @keyframes glassIn {
      from { opacity: 0; transform: translateY(14px) scale(.985); filter: blur(4px); }
      to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
    }

    @keyframes softPulse {
      0%, 100% { opacity: .42; transform: scale(1); }
      50% { opacity: .72; transform: scale(1.08); }
    }

    button, input, textarea { font: inherit; }
    button { cursor: pointer; border: 0; }

    .app {
      width: min(100%, 760px);
      margin: 0 auto;
      padding: calc(20px + env(safe-area-inset-top)) 16px calc(28px + env(safe-area-inset-bottom));
    }

    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin: 8px 0 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .seal {
      width: 54px;
      height: 54px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      color: #101820;
      background: radial-gradient(circle at 30% 22%, #fff1bd, var(--gold) 60%, #9d7937);
      box-shadow: 0 18px 38px rgba(216, 183, 111, .22), inset 0 0 0 1px rgba(255,255,255,.35);
      font-size: 26px;
      font-weight: 900;
      animation: softPulse 4.6s ease-in-out infinite;
    }

    .eyebrow {
      margin: 0 0 3px;
      color: var(--gold-2);
      font-size: 11px;
      letter-spacing: .22em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: 25px;
      line-height: 1;
      letter-spacing: -.05em;
    }

    .count {
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .hero {
      position: relative;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 30px;
      padding: 20px;
      background:
        linear-gradient(145deg, rgba(255,255,255,.14), rgba(255,255,255,.045)),
        linear-gradient(145deg, rgba(32, 48, 63, .74), rgba(13, 22, 30, .56));
      backdrop-filter: blur(28px) saturate(1.65);
      -webkit-backdrop-filter: blur(28px) saturate(1.65);
      box-shadow: var(--shadow);
      margin-bottom: 14px;
      animation: glassIn .52s cubic-bezier(.2,.8,.2,1) both;
    }

    .hero::after {
      content: "";
      position: absolute;
      width: 170px;
      height: 170px;
      right: -66px;
      top: -48px;
      border-radius: 50%;
      background: repeating-conic-gradient(from 18deg, rgba(243,217,148,.55) 0 9deg, rgba(255,255,255,.04) 9deg 18deg);
      opacity: .28;
    }

    .hero h2 {
      position: relative;
      z-index: 1;
      margin: 0 0 8px;
      font-size: 30px;
      letter-spacing: -.06em;
    }

    .hero p {
      position: relative;
      z-index: 1;
      margin: 0;
      max-width: 440px;
      color: var(--muted);
      line-height: 1.65;
      font-size: 14px;
    }

    .toolbar {
      position: sticky;
      top: env(safe-area-inset-top);
      z-index: 5;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      padding: 10px 0 12px;
      backdrop-filter: blur(22px) saturate(1.55);
      -webkit-backdrop-filter: blur(22px) saturate(1.55);
    }

    .search, .input, .textarea {
      width: 100%;
      min-height: 48px;
      border: 1px solid var(--line-2);
      border-radius: 18px;
      outline: none;
      color: var(--paper);
      background:
        linear-gradient(180deg, rgba(255,255,255,.105), rgba(255,255,255,.04)),
        rgba(13, 22, 30, .58);
      backdrop-filter: blur(20px) saturate(1.45);
      -webkit-backdrop-filter: blur(20px) saturate(1.45);
      padding: 12px 14px;
      font-size: 16px;
      transition: border .18s, box-shadow .18s, background .18s;
    }

    .search::placeholder, .input::placeholder, .textarea::placeholder { color: rgba(168,181,194,.68); }

    .search:focus, .input:focus, .textarea:focus {
      border-color: rgba(243, 217, 148, .72);
      box-shadow: 0 0 0 4px rgba(216,183,111,.13);
      background: rgba(20, 32, 43, .96);
    }

    .btn {
      min-height: 48px;
      padding: 0 17px;
      border-radius: 18px;
      color: #101820;
      background: linear-gradient(135deg, var(--gold-2), var(--gold));
      font-weight: 850;
      box-shadow: 0 15px 36px rgba(216, 183, 111, .18);
      transition: transform .16s ease, filter .16s ease, box-shadow .16s ease;
    }

    .btn:hover { filter: brightness(1.04); box-shadow: 0 18px 42px rgba(216, 183, 111, .23); }

    .btn:active, .chip:active { transform: scale(.985); }

    .btn.ghost {
      color: var(--paper);
      background: rgba(255,255,255,.06);
      border: 1px solid var(--line-2);
      box-shadow: none;
    }

    .btn.danger {
      color: #ffe0e0;
      background: rgba(255, 119, 119, .12);
      border: 1px solid rgba(255, 119, 119, .32);
      box-shadow: none;
    }

    .cards {
      display: grid;
      gap: 12px;
    }

    .card {
      position: relative;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 16px;
      background:
        linear-gradient(155deg, rgba(255,255,255,.13), rgba(255,255,255,.035)),
        linear-gradient(180deg, rgba(31,47,63,.76), rgba(26,39,53,.54));
      backdrop-filter: blur(26px) saturate(1.7);
      -webkit-backdrop-filter: blur(26px) saturate(1.7);
      box-shadow: 0 16px 46px rgba(0,0,0,.20);
      animation: glassIn .44s cubic-bezier(.2,.8,.2,1) both;
      transition: transform .18s ease, border-color .18s ease, box-shadow .18s ease;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 24% 0%, rgba(255,255,255,.20), transparent 13rem),
        linear-gradient(90deg, rgba(255,255,255,.18), transparent 36%);
      opacity: .62;
      mix-blend-mode: screen;
    }

    .card > * { position: relative; z-index: 1; }
    .card:hover { transform: translateY(-2px); border-color: rgba(243,217,148,.34); box-shadow: 0 22px 62px rgba(0,0,0,.26); }

    .card-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
    }

    .title {
      margin: 0;
      font-size: 18px;
      letter-spacing: -.025em;
      word-break: break-word;
    }

    .date {
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
    }

    .pill {
      flex: none;
      border-radius: 999px;
      padding: 6px 9px;
      color: var(--gold-2);
      background: rgba(216,183,111,.12);
      font-size: 12px;
    }

    .field {
      margin-top: 12px;
      display: grid;
      gap: 6px;
    }

    .label {
      color: var(--muted);
      font-size: 12px;
    }

    .value {
      min-height: 42px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 16px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.075), rgba(255,255,255,.03)),
        rgba(3, 8, 13, .24);
      backdrop-filter: blur(16px) saturate(1.35);
      -webkit-backdrop-filter: blur(16px) saturate(1.35);
      border: 1px solid rgba(255,255,255,.06);
      word-break: break-all;
    }

    .value code {
      color: var(--gold-2);
      font-family: "SF Mono", ui-monospace, Menlo, Consolas, monospace;
      font-size: 14px;
    }

    .note {
      color: #d2dbe2;
      line-height: 1.55;
      white-space: pre-wrap;
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-top: 14px;
    }

    .chip {
      min-height: 40px;
      border-radius: 14px;
      color: var(--paper);
      background: rgba(255,255,255,.06);
      border: 1px solid var(--line-2);
      font-size: 13px;
      backdrop-filter: blur(14px) saturate(1.45);
      -webkit-backdrop-filter: blur(14px) saturate(1.45);
      transition: transform .14s ease, background .14s ease, border-color .14s ease;
    }

    .chip:hover { background: rgba(255,255,255,.10); border-color: rgba(243,217,148,.28); }

    .chip.warn { color: #ffd7d7; border-color: rgba(255, 119, 119, .28); }

    .empty {
      border: 1px dashed rgba(243,217,148,.25);
      border-radius: 26px;
      padding: 36px 18px;
      text-align: center;
      color: var(--muted);
      background: rgba(20, 32, 43, .44);
      line-height: 1.7;
    }

    .utility {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }

    dialog {
      width: min(94vw, 560px);
      max-height: min(88vh, 760px);
      border: 1px solid rgba(243,217,148,.25);
      border-radius: 28px;
      color: var(--paper);
      background:
        linear-gradient(155deg, rgba(255,255,255,.15), rgba(255,255,255,.04)),
        linear-gradient(180deg, rgba(30,48,64,.88), rgba(16,24,32,.78));
      backdrop-filter: blur(32px) saturate(1.75);
      -webkit-backdrop-filter: blur(32px) saturate(1.75);
      padding: 0;
      box-shadow: var(--shadow);
    }

    dialog::backdrop {
      background: rgba(0,0,0,.66);
      backdrop-filter: blur(7px);
      -webkit-backdrop-filter: blur(7px);
    }

    .form {
      display: grid;
      gap: 12px;
      padding: 20px;
    }

    .form h2 { margin: 0 0 2px; letter-spacing: -.04em; }

    label {
      display: grid;
      gap: 7px;
      color: var(--muted);
      font-size: 13px;
    }

    .textarea { min-height: 92px; resize: vertical; }

    .form-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 4px;
    }

    .toast {
      position: fixed;
      left: 16px;
      right: 16px;
      bottom: calc(18px + env(safe-area-inset-bottom));
      z-index: 10;
      width: min(520px, calc(100% - 32px));
      margin: 0 auto;
      padding: 13px 15px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(9, 15, 21, .92);
      color: var(--paper);
      box-shadow: var(--shadow);
      text-align: center;
      opacity: 0;
      transform: translateY(12px);
      transition: .22s;
      pointer-events: none;
    }

    .toast.show { opacity: 1; transform: translateY(0); }

    .hidden { display: none !important; }

    @media (min-width: 700px) {
      .cards { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .card { min-height: 260px; }
    }

    @media (max-width: 420px) {
      .actions { grid-template-columns: repeat(2, 1fr); }
      .hero h2 { font-size: 27px; }
      .hero { border-radius: 26px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: .001ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: .001ms !important;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="top">
      <div class="brand">
        <div class="seal" aria-hidden="true">✦</div>
        <div>
          <p class="eyebrow">Vault</p>
          <h1>口袋保险箱</h1>
        </div>
      </div>
      <div class="count" id="count">0 条</div>
    </header>

    <section class="hero">
      <h2>你的账号钥匙柜。</h2>
      <p>保存账号、密码、网址和备注。打开就能查，复制一下就能用。</p>
    </section>

    <section class="toolbar">
      <input id="search" class="search" autocomplete="off" placeholder="搜索账号、标题、网址…" />
      <button id="add" class="btn">新增</button>
    </section>

    <section id="cards" class="cards" aria-live="polite"></section>

    <section class="utility">
      <button id="export" class="btn ghost">导出</button>
      <button id="import" class="btn ghost">导入</button>
      <input id="file" class="hidden" type="file" accept="application/json,.json" />
    </section>
  </main>

  <dialog id="editor">
    <form id="form" class="form">
      <h2 id="editorTitle">新增账号</h2>
      <input id="id" type="hidden" />
      <label>标题
        <input id="title" class="input" required placeholder="例如：微信 / Steam / 服务器" />
      </label>
      <label>账号
        <input id="username" class="input" placeholder="邮箱、手机号或用户名" />
      </label>
      <label>密码
        <input id="password" class="input" placeholder="密码" />
      </label>
      <label>网址
        <input id="website" class="input" placeholder="https://example.com" />
      </label>
      <label>备注
        <textarea id="note" class="textarea" placeholder="密保、用途、到期时间……"></textarea>
      </label>
      <div class="form-actions">
        <button type="button" id="cancel" class="btn ghost">取消</button>
        <button type="submit" class="btn">保存</button>
      </div>
    </form>
  </dialog>

  <div id="toast" class="toast"></div>

  <script>
    const STORAGE_KEY = 'pocket-vault-local-v1';
    const $ = (selector) => document.querySelector(selector);
    const els = {
      cards: $('#cards'),
      count: $('#count'),
      search: $('#search'),
      add: $('#add'),
      editor: $('#editor'),
      form: $('#form'),
      editorTitle: $('#editorTitle'),
      id: $('#id'),
      title: $('#title'),
      username: $('#username'),
      password: $('#password'),
      website: $('#website'),
      note: $('#note'),
      cancel: $('#cancel'),
      toast: $('#toast'),
      export: $('#export'),
      import: $('#import'),
      file: $('#file')
    };

    let accounts = loadAccounts();

    function uid() {
      return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
    }

    function nowText() {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    }

    function loadAccounts() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        const parsed = raw ? JSON.parse(raw) : [];
        return Array.isArray(parsed) ? parsed : [];
      } catch (_) {
        return [];
      }
    }

    function saveAccounts() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(accounts));
    }

    function toast(message) {
      els.toast.textContent = message;
      els.toast.classList.add('show');
      clearTimeout(toast.timer);
      toast.timer = setTimeout(() => els.toast.classList.remove('show'), 1800);
    }

    function escapeHtml(value) {
      const div = document.createElement('div');
      div.textContent = value == null ? '' : String(value);
      return div.innerHTML;
    }

    function mask(value) {
      const length = Math.max(8, Math.min(String(value || '').length, 18));
      return '•'.repeat(length);
    }

    function filteredAccounts() {
      const q = els.search.value.trim().toLowerCase();
      const sorted = [...accounts].sort((a, b) => String(b.updatedAt || '').localeCompare(String(a.updatedAt || '')));
      if (!q) return sorted;
      return sorted.filter((a) => [a.title, a.username, a.password, a.website, a.note]
        .some((v) => String(v || '').toLowerCase().includes(q)));
    }

    function render() {
      const rows = filteredAccounts();
      els.count.textContent = `${accounts.length} 条`;
      els.cards.innerHTML = '';

      if (!rows.length) {
        els.cards.innerHTML = `<div class="empty">${accounts.length ? '没有搜到匹配内容。' : '还没有账号。点“新增”保存第一个账号。'}</div>`;
        return;
      }

      for (const account of rows) {
        const card = document.createElement('article');
        card.className = 'card';
        card.innerHTML = `
          <div class="card-head">
            <div>
              <h3 class="title">${escapeHtml(account.title || '未命名账号')}</h3>
              <div class="date">更新于 ${escapeHtml(account.updatedAt || account.createdAt || '')}</div>
            </div>
            <div class="pill">私密</div>
          </div>
          <div class="field">
            <div class="label">账号</div>
            <div class="value"><span>${escapeHtml(account.username || '未填写')}</span></div>
          </div>
          <div class="field">
            <div class="label">密码</div>
            <div class="value"><code>${mask(account.password)}</code><button class="chip reveal">显示</button></div>
          </div>
          ${account.website ? `<div class="field"><div class="label">网址</div><div class="value"><span>${escapeHtml(account.website)}</span></div></div>` : ''}
          ${account.note ? `<div class="field"><div class="label">备注</div><div class="value note">${escapeHtml(account.note)}</div></div>` : ''}
          <div class="actions">
            <button class="chip copy-user">复制账号</button>
            <button class="chip copy-pass">复制密码</button>
            <button class="chip edit">编辑</button>
            <button class="chip warn delete">删除</button>
          </div>
        `;

        let shown = false;
        card.querySelector('.reveal').addEventListener('click', () => {
          shown = !shown;
          card.querySelector('code').textContent = shown ? (account.password || '') : mask(account.password);
          card.querySelector('.reveal').textContent = shown ? '隐藏' : '显示';
        });
        card.querySelector('.copy-user').addEventListener('click', () => copyText(account.username, '账号已复制'));
        card.querySelector('.copy-pass').addEventListener('click', () => copyText(account.password, '密码已复制'));
        card.querySelector('.edit').addEventListener('click', () => openEditor(account));
        card.querySelector('.delete').addEventListener('click', () => deleteAccount(account.id));
        els.cards.appendChild(card);
      }
    }

    async function copyText(value, message) {
      if (!value) return toast('没有可复制的内容');
      try {
        await navigator.clipboard.writeText(value);
        toast(message);
      } catch (_) {
        toast('复制失败，请长按手动复制');
      }
    }

    function openEditor(account) {
      els.editorTitle.textContent = account ? '编辑账号' : '新增账号';
      els.id.value = account?.id || '';
      els.title.value = account?.title || '';
      els.username.value = account?.username || '';
      els.password.value = account?.password || '';
      els.website.value = account?.website || '';
      els.note.value = account?.note || '';
      els.editor.showModal();
      setTimeout(() => els.title.focus(), 60);
    }

    function closeEditor() {
      els.editor.close();
      els.form.reset();
      els.id.value = '';
    }

    function deleteAccount(id) {
      const account = accounts.find((a) => a.id === id);
      if (!account) return;
      if (!confirm(`删除「${account.title || '未命名账号'}」？这个操作不能撤销。`)) return;
      accounts = accounts.filter((a) => a.id !== id);
      saveAccounts();
      render();
      toast('已删除');
    }

    els.form.addEventListener('submit', (event) => {
      event.preventDefault();
      const title = els.title.value.trim();
      if (!title) return toast('标题不能为空');

      const payload = {
        title,
        username: els.username.value.trim(),
        password: els.password.value,
        website: els.website.value.trim(),
        note: els.note.value.trim(),
        updatedAt: nowText()
      };

      if (els.id.value) {
        accounts = accounts.map((a) => a.id === els.id.value ? { ...a, ...payload } : a);
      } else {
        accounts.push({ id: uid(), createdAt: nowText(), ...payload });
      }

      saveAccounts();
      closeEditor();
      render();
      toast('已保存');
    });

    function exportBackup() {
      const blob = new Blob([JSON.stringify({ app: '口袋保险箱', version: 1, exportedAt: new Date().toISOString(), accounts }, null, 2)], {
        type: 'application/json'
      });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `口袋保险箱备份-${nowText()}.json`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
      toast('已导出');
    }

    function importBackup(file) {
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const parsed = JSON.parse(reader.result);
          const imported = Array.isArray(parsed) ? parsed : parsed.accounts;
          if (!Array.isArray(imported)) throw new Error('格式不对');
          if (!confirm(`导入 ${imported.length} 条数据？会覆盖当前 ${accounts.length} 条。`)) return;
          accounts = imported.map((a) => ({
            id: a.id || uid(),
            title: String(a.title || '未命名账号'),
            username: String(a.username || ''),
            password: String(a.password || ''),
            website: String(a.website || ''),
            note: String(a.note || a.remark || ''),
            createdAt: String(a.createdAt || nowText()),
            updatedAt: String(a.updatedAt || nowText())
          }));
          saveAccounts();
          render();
          toast('已导入');
        } catch (_) {
          toast('导入失败，文件格式不对');
        }
      };
      reader.readAsText(file);
    }

    els.add.addEventListener('click', () => openEditor(null));
    els.cancel.addEventListener('click', closeEditor);
    els.search.addEventListener('input', render);
    els.export.addEventListener('click', exportBackup);
    els.import.addEventListener('click', () => els.file.click());
    els.file.addEventListener('change', () => {
      if (els.file.files[0]) importBackup(els.file.files[0]);
      els.file.value = '';
    });
    els.editor.addEventListener('click', (event) => {
      if (event.target === els.editor) closeEditor();
    });

    render();

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
</body>
</html>
